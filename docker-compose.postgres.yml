services:
  postgres:
    image: postgres:17-alpine
    container_name: lumivex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LUMIVEX_POSTGRES_USER:-lumivex}
      POSTGRES_PASSWORD: ${LUMIVEX_POSTGRES_PASSWORD:-lumivex_dev_password}
      POSTGRES_DB: ${LUMIVEX_POSTGRES_DB:-lumivex}
    ports:
      - "${LUMIVEX_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LUMIVEX_POSTGRES_USER:-lumivex} -d ${LUMIVEX_POSTGRES_DB:-lumivex}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - lumivex-postgres-data:/var/lib/postgresql/data

  adminer:
    image: adminer:4.8.1
    container_name: lumivex-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${LUMIVEX_ADMINER_PORT:-8088}:8080"

  mailpit:
    image: axllent/mailpit:v1.27
    container_name: lumivex-mailpit
    restart: unless-stopped
    ports:
      - "${LUMIVEX_MAILPIT_SMTP_PORT:-1025}:1025"
      - "${LUMIVEX_MAILPIT_UI_PORT:-8025}:8025"

volumes:
  lumivex-postgres-data: