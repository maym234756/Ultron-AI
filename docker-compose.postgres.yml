services:
  postgres:
    image: postgres:17-alpine
    container_name: astra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ASTRA_POSTGRES_USER:-astra}
      POSTGRES_PASSWORD: ${ASTRA_POSTGRES_PASSWORD:-astra_dev_password}
      POSTGRES_DB: ${ASTRA_POSTGRES_DB:-astra}
    ports:
      - "${ASTRA_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ASTRA_POSTGRES_USER:-astra} -d ${ASTRA_POSTGRES_DB:-astra}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - astra-postgres-data:/var/lib/postgresql/data

  adminer:
    image: adminer:4.8.1
    container_name: astra-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ASTRA_ADMINER_PORT:-8088}:8080"

  mailpit:
    image: axllent/mailpit:v1.27
    container_name: astra-mailpit
    restart: unless-stopped
    ports:
      - "${ASTRA_MAILPIT_SMTP_PORT:-1025}:1025"
      - "${ASTRA_MAILPIT_UI_PORT:-8025}:8025"

volumes:
  astra-postgres-data: