services:
  - type: web
    name: astra-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/backend/status
    preDeployCommand: npm run db:push:postgres
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8787
      - key: APP_ORIGIN
        value: https://astra-one-red.vercel.app,https://lumivexai.com,https://www.lumivexai.com
      - key: DATABASE_URL
        fromDatabase:
          name: astra-postgres
          property: connectionString
      - key: AUTH_SESSION_COOKIE
        value: lumivex_session
      - key: AUTH_COOKIE_SAME_SITE
        value: none
      - key: AUTH_COOKIE_SECURE
        value: "1"
      - key: CREDENTIAL_ENCRYPTION_KEY
        generateValue: true
      - key: AUTH_CHALLENGE_DELIVERY
        value: smtp
      - key: AUTH_SMTP_HOST
        sync: false
      - key: AUTH_SMTP_PORT
        value: "587"
      - key: AUTH_SMTP_SECURE
        value: "0"
      - key: AUTH_SMTP_USER
        sync: false
      - key: AUTH_SMTP_PASS
        sync: false
      - key: AUTH_MAIL_FROM
        value: Lumivex AI <no-reply@lumivexai.com>
      - key: MODEL_PROVIDER
        value: ollama
      - key: MODEL_NAME
        value: llama3.2
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: llama3.2

databases:
  - name: astra-postgres
    databaseName: astra
    user: astra