services:
  - type: web
    name: astra-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/backend/status
    preDeployCommand: npm run db:push:postgres
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8787
      - key: APP_ORIGIN
        value: https://astra-one-red.vercel.app,https://lumivexai.com,https://www.lumivexai.com
      - key: DATABASE_URL
        fromDatabase:
          name: astra-postgres
          property: connectionString
      - key: AUTH_SESSION_COOKIE
        value: lumivex_session
      - key: AUTH_COOKIE_SAME_SITE
        value: none
      - key: AUTH_COOKIE_SECURE
        value: "1"
      - key: CREDENTIAL_ENCRYPTION_KEY
        generateValue: true
      - key: AUTH_CHALLENGE_DELIVERY
        value: smtp
      - key: AUTH_SMTP_HOST
        sync: false
      - key: AUTH_SMTP_PORT
        value: "587"
      - key: AUTH_SMTP_SECURE
        value: "0"
      - key: AUTH_SMTP_USER
        sync: false
      - key: AUTH_SMTP_PASS
        sync: false
      - key: AUTH_MAIL_FROM
        value: Lumivex AI <no-reply@lumivexai.com>
      - key: MODEL_PROVIDER
        value: openai-compatible
      - key: MODEL_API_BASE_URL
        value: https://api.openai.com/v1
      - key: MODEL_API_KEY
        sync: false
      - key: MODEL_NAME
        value: gpt-4o-mini
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_BUSINESS
        sync: false
      - key: STRIPE_APP_ORIGIN
        value: https://lumivexai.com
      - key: STRIPE_SUCCESS_URL
        value: https://lumivexai.com/?billing=success
      - key: STRIPE_CANCEL_URL
        value: https://lumivexai.com/?billing=cancelled
      - key: STRIPE_PORTAL_RETURN_URL
        value: https://lumivexai.com
      - key: OPENAI_INPUT_USD_PER_1M
        value: "0.15"
      - key: OPENAI_OUTPUT_USD_PER_1M
        value: "0.60"
      - key: BILLING_USAGE_MARKUP
        value: "4"

databases:
  - name: astra-postgres
    databaseName: astra
    user: astra